name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.preset }} / ${{ matrix.os }} / ${{ matrix.compiler }}
    runs-on: ${{ matrix.os }}
    env:
      CC: ${{ matrix.compiler == 'gcc' && 'gcc' || 'clang' }}
      CXX: ${{ matrix.compiler == 'gcc' && 'g++' || 'clang++' }}
      CMAKE_ARGS: -DWARNINGS_AS_ERRORS=ON
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        preset: [release, sanitize, coverage]
        compiler: [gcc, clang]
        exclude:
          - os: macos-latest
            compiler: gcc

    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: conan-${{ matrix.os }}-${{ matrix.compiler }}-${{ hashFiles('conanfile.py', 'conan.lock') }}
          restore-keys: conan-${{ matrix.os }}-${{ matrix.compiler }}-
      - uses: conan-io/setup-conan@v1
      - name: Verify conan.lock freshness
        run: |
          conan lock create . -pr=profiles/default --lockfile-out=/tmp/fresh.lock
          diff conan.lock /tmp/fresh.lock
      - if: matrix.preset == 'coverage'
        run: python3 -m pip install --user gcovr
      - run: make bootstrap
      - run: make ${{ matrix.preset }}
      - if: matrix.preset == 'coverage'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}-${{ matrix.compiler }}
          path: build/coverage/coverage-report/

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: conan-io/setup-conan@v1
      - run: make bootstrap
      - run: make format-check
      - run: make lint
