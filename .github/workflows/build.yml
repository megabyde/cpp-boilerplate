name: Build

on:
  push:
    branches: main
  pull_request:
    branches: main

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Check formatting
      run: make format-check

    - name: Set up Conan
      uses: conan-io/setup-conan@v1

    - name: Run clang-tidy
      run: make lint

  debug:
    name: Debug (${{ matrix.os }})
    needs: quality
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Conan
      uses: conan-io/setup-conan@v1

    - name: Install lcov
      if: matrix.os == 'ubuntu-latest'
      run: sudo apt-get update && sudo apt-get install --yes lcov

    - name: Install lcov
      if: matrix.os == 'macos-latest'
      run: brew install lcov

    - name: Run debug pipeline
      run: make coverage

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report-${{ matrix.os }}
        path: build/debug/coverage-report

  release:
    name: Release (${{ matrix.os }})
    needs: quality
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Conan
      uses: conan-io/setup-conan@v1

    - name: Run release pipeline
      run: make release
