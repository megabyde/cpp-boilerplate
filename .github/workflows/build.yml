name: Build

on:
  push:
    branches: main
  pull_request:
    branches: main

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Cache Conan packages
      uses: actions/cache@v4
      with:
        path: ~/.conan2
        key: conan-ubuntu-latest-${{ hashFiles('conanfile.py', 'conan.lock') }}
        restore-keys: |
          conan-ubuntu-latest-

    - name: Check formatting
      run: make format-check

    - name: Set up Conan
      uses: conan-io/setup-conan@v1

    - name: Run clang-tidy
      run: make lint

  debug:
    name: Debug (${{ matrix.os }})
    needs: quality
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Cache Conan packages
      uses: actions/cache@v4
      with:
        path: ~/.conan2
        key: conan-${{ matrix.os }}-${{ hashFiles('conanfile.py', 'conan.lock') }}
        restore-keys: |
          conan-${{ matrix.os }}-

    - name: Set up Conan
      uses: conan-io/setup-conan@v1

    - name: Install GNU Make
      if: matrix.os == 'windows-latest'
      run: |
        choco install make --yes
        echo "C:\ProgramData\chocolatey\bin" >> $env:GITHUB_PATH

    - name: Install lcov
      if: matrix.os == 'ubuntu-latest'
      run: sudo apt-get update && sudo apt-get install --yes lcov

    - name: Install lcov
      if: matrix.os == 'macos-latest'
      run: brew install lcov

    - name: Run debug pipeline
      if: matrix.os != 'windows-latest'
      run: make coverage

    - name: Run debug pipeline (Windows)
      if: matrix.os == 'windows-latest'
      shell: bash
      run: make test-debug

    - name: Upload coverage report
      if: matrix.os != 'windows-latest'
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report-${{ matrix.os }}
        path: build/debug/coverage-report

  release:
    name: Release (${{ matrix.os }})
    needs: quality
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Cache Conan packages
      uses: actions/cache@v4
      with:
        path: ~/.conan2
        key: conan-${{ matrix.os }}-${{ hashFiles('conanfile.py', 'conan.lock') }}
        restore-keys: |
          conan-${{ matrix.os }}-

    - name: Set up Conan
      uses: conan-io/setup-conan@v1

    - name: Install GNU Make
      if: matrix.os == 'windows-latest'
      run: |
        choco install make --yes
        echo "C:\ProgramData\chocolatey\bin" >> $env:GITHUB_PATH

    - name: Run release pipeline
      if: matrix.os != 'windows-latest'
      run: make release

    - name: Run release pipeline (Windows)
      if: matrix.os == 'windows-latest'
      shell: bash
      run: make release
